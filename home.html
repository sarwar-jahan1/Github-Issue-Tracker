<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- Tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <header>
        <nav class="mb-10">
            <div class="navbar bg-gray-200  flex justify-between p-4 ">
                <div class="flex gap-2 items-center ">
                    <img class="w-9 h-9" src="./assets/github-logo.png" alt="">
                    <p class="text-xl ">GitHub Issues Tracker</p>
                </div>
                <div class="flex gap-2">
                    <div class="relative w-60">

                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2"></i>

                        <input id="searchInput" type="search" placeholder="Search issues..."
                            class="input input-bordered w-full pl-10" />

                    </div>

                    <button id="searchBtn" class="btn btn-primary text-white">
                        <i class="fa-solid fa-plus"></i>
                        New Issues
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main -->
    <main class="w-11/12 mx-auto">
        <section>
            <div class="flex gap-4 p-4 shadow-sm mb-4">
                <button id="all" class="btn w-20">All</button>
                <button id="open" class="btn btn-base w-20">Open</button>
                <button id="closed" class="btn btn-base w-20">Closed</button>
            </div>
        </section>

        <section class="mb-4">
            <div class="flex gap-4 p-3 shadow-sm justify-between">

                <div class="flex items-center gap-3">
                    <img class="w-6 h-6" src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 class="text-xl font-semibold">
                            <span id="issueCount">0</span> Issues
                        </h2>
                        <p class="text-gray">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-6 p-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                        <p class="text-gray-700 font-medium">Open</p>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                        <p class="text-gray-700 font-medium">Closed</p>
                    </div>

                </div>

            </div>
        </section>

        <!-- card section -->
        <section>

            <div id="loadingSpinner" class="flex h-[60vh] hidden justify-center items-center">
                <span class="loading loading-dots loading-xl"></span>
            </div>

            <div id="cardsContainer" class="grid lg:grid-cols-4 sm:grid-cols-2 gap-6">
                <!-- cards dynamically -->
            </div>

        </section>

        <!-- Modal-->
        <dialog id="issueModal" class="modal">
            <div id="modalContent" class="modal-box max-w-2xl"></div>

            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>

    </main>


    <!-- JS -->
    <script src="script.js"></script>


</body>

</html>
